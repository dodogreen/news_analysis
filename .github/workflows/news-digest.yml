name: News Digest

on:
  schedule:
    - cron: '30 0 * * *'  # 08:30 TW
    - cron: '0 10 * * *'  # 18:00 TW
  workflow_dispatch: # 手動觸發，全部執行

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Installs Infisical CLI, authenticates, pulls all secrets into $GITHUB_ENV,
      # writes config.yaml, and installs Python dependencies.
      # Only INFISICAL_CLIENT_ID / _SECRET / _PROJECT_ID need to be GitHub Secrets.
      - name: Setup cloud environment (Infisical)
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
        run: bash scripts/setup_cloud.sh

      # All secrets from Infisical are now available as env vars (via $GITHUB_ENV).
      # The pipeline reads GEMINI_API_KEY, NEWSAPI_KEY, SMTP_*, etc. from the environment.
      - name: Run pipeline
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: python -m src.main
